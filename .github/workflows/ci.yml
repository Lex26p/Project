name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore Dispatcher.slnx --locked-mode
      - name: Build
        run: dotnet build Dispatcher.slnx --configuration Release --no-restore
      - name: Test
        run: dotnet test Dispatcher.slnx --configuration Release --no-build
